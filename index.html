<!DOCTYPE html>
<html>
<head>
    <title>Simple Table Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 style="text-align:center;">User Data Table</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Abhishek</td>
            <td>22</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>24</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Aman</td>
            <td>21</td>
            <td>Jaipur</td>
        </tr>
    </table>

</body>
</html>
